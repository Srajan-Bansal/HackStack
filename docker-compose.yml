services:
  # ========================
  # Infrastructure
  # ========================
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hackstack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-hackstack}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hackstack}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.1
    hostname: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ========================
  # Application Services
  # ========================
  http-backend:
    build:
      context: ./HackStack-server
      dockerfile: Docker/http-backend.Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-hackstack}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-hackstack}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      KAFKA_BROKER: kafka:29092
      KAFKA_CLIENT_ID: hackstack-backend
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-here}
      JWT_COOKIE_EXPIRES_IN: ${JWT_COOKIE_EXPIRES_IN:-604800000}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_SALT_ROUNDS: ${JWT_SALT_ROUNDS:-10}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      KAFKAJS_NO_PARTITIONER_WARNING: 1
    volumes:
      - ./hackstack-problems:/hackstack-problems:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  submission-webhook:
    build:
      context: ./HackStack-server
      dockerfile: Docker/submission-webhook.Dockerfile
    restart: unless-stopped
    ports:
      - "${WEBHOOK_PORT:-3001}:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-hackstack}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-hackstack}
      KAFKA_BROKER: kafka:29092
      KAFKAJS_NO_PARTITIONER_WARNING: 1
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  web:
    build:
      context: ./HackStack-server
      dockerfile: Docker/web.Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:3000}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - http-backend

  executor:
    build:
      context: ./executor
      dockerfile: Dockerfile
    restart: unless-stopped
    privileged: true
    ports:
      - "8081:8081"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
    volumes:
      - ./hackstack-problems:/hackstack-problems:ro
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
